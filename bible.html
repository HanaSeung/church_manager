<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#2f6f4f">
  <title>성경 뷰어 · 교회 통합 관리</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --green:#2f6f4f; --green-d:#245a40; --green-soft:#e7f1ec;
      --bg:#f5f6f4; --card:#fff; --text:#1f2421; --muted:#6b726d; --line:#e2e5e1;
      --fs:20px;
    }
    body { font-family:'Malgun Gothic',system-ui,sans-serif; background:var(--bg);
      color:var(--text); line-height:1.6; }
    .topbar { background:var(--green); color:#fff; padding:12px 16px;
      display:flex; align-items:center; gap:12px; }
    .topbar a { color:#fff; text-decoration:none; font-size:14px; opacity:.9; }
    .topbar h1 { font-size:17px; font-weight:700; }
    #fixedHead { position:fixed; top:0; left:0; right:0; z-index:20;
      background:var(--bg); box-shadow:0 2px 6px rgba(0,0,0,.08); }
    #fixedHead .controls { margin:0; border-radius:0; border-left:none; border-right:none; }
    .wrap { max-width:860px; margin:0 auto; padding:14px 16px 60px; }
  </style>
</head>
<body>
  <div id="fixedHead">
  <div class="topbar">
    <a href="index.html">← 홈</a>
    <h1>성경 뷰어</h1>
  </div>

    <div class="controls" id="controls">
      <div class="row main">
        <div class="grp sels">
          <button id="verBtn" class="verbtn" title="번역본 선택">개역개정</button>
          <button id="locBtn" class="locbox" title="책·장·절 선택">
            <span id="locBook" class="loc-book">창</span><span id="locCV" class="loc-cv">1:1</span>
          </button>
        </div>
        <div class="grp btns">
          <button id="prevBtn" class="navb ic" title="이전 장">◀</button>
          <button id="nextBtn" class="navb ic" title="다음 장">▶</button>
          <button id="fsDown" class="navb ic" title="글자 작게">가−</button>
          <button id="fsUp" class="navb ic" title="글자 크게">가＋</button>
        </div>
      </div>
    </div>
  </div>

  <div id="pickerOverlay" class="picker-overlay" style="display:none;">
    <div class="picker-box">
      <div class="picker-head">
        <button id="pickerBack" class="pk-back" title="닫기">‹</button>
        <button id="otTab" class="pk-ot">구약</button>
        <button id="ntTab" class="pk-nt">신약</button>
        <span class="pk-spacer"></span>
        <button id="pickerOk" class="pk-ok">확인</button>
      </div>
      <div class="picker-cols">
        <div id="colBook" class="picker-col"></div>
        <div id="colChap" class="picker-col"></div>
        <div id="colVerse" class="picker-col"></div>
      </div>
    </div>
  </div>

  <div id="verOverlay" class="picker-overlay" style="display:none;">
    <div class="picker-box" style="max-width:300px;">
      <div class="picker-head">
        <button id="verBack" class="pk-back" title="닫기">‹</button>
        <span class="pk-title">번역본 선택</span>
      </div>
      <div id="verList" class="picker-col" style="max-height:60vh;"></div>
    </div>
  </div>

  <div class="wrap">
    <div id="status" class="status">데이터를 불러오는 중…</div>
    <div id="content"></div>
  </div>

  <style>
    .controls { background:var(--card); border:1px solid var(--line); border-radius:12px;
      padding:8px; margin-bottom:14px; }
    .row { display:flex; gap:4px; align-items:center; }
    .row.main { flex-wrap:nowrap; }
    .grp { display:flex; gap:4px; align-items:center; }
    .grp.sels { flex:1 1 auto; min-width:0; }
    .grp.btns { flex:0 0 auto; justify-content:flex-end; gap:0; }
    .sel { padding:10px 2px; font-size:14px; border:1px solid var(--line);
      border-radius:7px; background:#fff; color:var(--text); min-width:0; }
    .locbox { flex:0 0 auto; padding:8px 2px; font-size:17px; font-weight:800;
      border:none; background:none;
      cursor:pointer; text-align:left; white-space:nowrap;
      display:flex; align-items:baseline; gap:5px; }
    .locbox:hover .loc-book, .locbox:hover .loc-cv { opacity:.7; }
    .loc-book { color:var(--green); }
    .loc-cv { color:var(--text); }
    .verbtn { flex:0 0 auto; padding:8px 2px; font-size:17px; font-weight:800;
      border:none; background:none; color:#d6442f;
      cursor:pointer; white-space:nowrap; }
    .verbtn:hover { opacity:.7; }
    .pk-title { font-size:16px; font-weight:700; color:var(--text); }
    .navb { padding:8px 4px; font-size:14px; border:none; border-radius:0;
      background:none; color:var(--text); cursor:pointer; white-space:nowrap; }
    .navb:hover { color:var(--green); opacity:.8; }
    .navb.ic { flex:0 0 auto; padding:8px 5px; min-width:28px; text-align:center;
      font-size:17px; line-height:1.2; }
    #prevBtn, #nextBtn { font-size:18px; color:var(--green); }
    .picker-overlay { position:fixed; inset:0; z-index:50; background:rgba(0,0,0,.4);
      display:flex; align-items:center; justify-content:center; padding:16px; }
    .picker-box { background:#fff; border-radius:14px; width:100%; max-width:460px;
      max-height:80vh; display:flex; flex-direction:column; overflow:hidden; }
    .picker-head { display:flex; align-items:center; gap:10px;
      padding:12px 14px; border-bottom:1px solid var(--line); }
    .pk-back { border:none; background:none; font-size:24px; font-weight:700; line-height:1;
      color:#2f6fd6; cursor:pointer; padding:0 2px; }
    .pk-ot { border:none; background:none; font-size:16px; font-weight:700;
      color:#2f6fd6; cursor:pointer; padding:2px 4px; }
    .pk-nt { border:none; background:none; font-size:16px; font-weight:700;
      color:#d6442f; cursor:pointer; padding:2px 4px; }
    .pk-ot.on, .pk-nt.on { text-decoration:underline; text-underline-offset:5px; }
    .pk-spacer { flex:1; }
    .pk-direct { border:1px solid var(--line); background:#f5f6f4; color:var(--text);
      font-size:14px; padding:7px 14px; border-radius:8px; cursor:pointer; }
    .pk-ok { border:none; background:none; font-size:16px; font-weight:700;
      color:#d6442f; cursor:pointer; padding:2px 4px; }
    .picker-cols { display:flex; flex:1; min-height:0; }
    .picker-col { flex:1; overflow-y:auto; border-right:1px solid var(--line);
      position:relative; -webkit-overflow-scrolling:touch; }
    .picker-col:last-child { border-right:none; }
    #colChap, #colVerse { flex:0.5; }
    .pick-item { padding:12px 8px; font-size:15px; text-align:center; cursor:pointer;
      border-bottom:1px solid #f0f2ef; }
    .pick-item:hover { background:var(--green-soft); }
    .pick-item.on { background:var(--green); color:#fff; font-weight:700; }
    #colBook .pick-item { font-size:14px; }
    .status { color:var(--muted); font-size:14px; padding:20px 4px; text-align:center; }
    .chap-title { font-size:22px; font-weight:700; color:var(--green-d);
      margin:8px 0 14px; padding-bottom:8px; border-bottom:2px solid var(--green-soft); }
    .verse { font-size:var(--fs); margin-bottom:10px; display:flex; }
    .vnum { flex:0 0 auto; min-width:26px; color:var(--green); font-weight:700;
      font-size:.82em; line-height:1.9; margin-right:6px; }
    .vtext { flex:1; }
    .verse mark { background:#fdf3c0; padding:0 1px; }
    .verse.hl { background:#fff6d8; border-left:3px solid var(--green); border-radius:0;
      padding:6px 10px; margin-left:-13px; transition:background .3s; }
    .searchres { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:8px; }
    .sr-item { padding:10px 12px; border-bottom:1px solid var(--line); cursor:pointer; }
    .sr-item:last-child { border-bottom:none; }
    .sr-item:hover { background:var(--green-soft); }
    .sr-ref { color:var(--green); font-weight:700; font-size:13px; margin-right:8px; }
    .sr-cnt { font-size:14px; }
    .sr-head { display:flex; justify-content:space-between; align-items:center;
      padding:6px 12px 12px; color:var(--muted); font-size:13px; }
    .sr-close { cursor:pointer; color:var(--green); font-weight:700; }
  </style>

  <script>
    function adjustHeadSpace() {
      var head = document.getElementById('fixedHead');
      var wrap = document.querySelector('.wrap');
      if (head && wrap) wrap.style.paddingTop = (head.offsetHeight + 12) + 'px';
    }
    window.addEventListener('resize', adjustHeadSpace);
    window.addEventListener('load', adjustHeadSpace);

    var BIBLE = null;
    var curBook = 0, curChap = 0;
    var FS = 20, FS_MIN = 14, FS_MAX = 40;
    var VERSIONS = [];
    var curVersion = '개역개정';

    var locBtn = document.getElementById('locBtn');
    var locBook = document.getElementById('locBook');
    var locCV = document.getElementById('locCV');
    var verBtn = document.getElementById('verBtn');
    var verOverlay = document.getElementById('verOverlay');
    var verList = document.getElementById('verList');
    var pickerOverlay = document.getElementById('pickerOverlay');
    var colBook = document.getElementById('colBook');
    var colChap = document.getElementById('colChap');
    var colVerse = document.getElementById('colVerse');
    var contentEl = document.getElementById('content');
    var statusEl = document.getElementById('status');
    var curVerse = 1;

    fetch('data/bible/versions.json')
      .then(function (r) { return r.ok ? r.json() : ['개역개정']; })
      .then(function (list) {
        VERSIONS = (list && list.length) ? list : ['개역개정'];
        buildVersionOptions();
        curVersion = VERSIONS[0];
        loadVersion(curVersion, 0, 0);
      })
      .catch(function () {
        VERSIONS = ['개역개정'];
        buildVersionOptions();
        loadVersion('개역개정', 0, 0);
      });

    function buildVersionOptions() {
      verList.innerHTML = '';
      VERSIONS.forEach(function (v) {
        var el = document.createElement('div');
        el.className = 'pick-item' + (v === curVersion ? ' on' : '');
        el.textContent = v;
        el.addEventListener('click', function () {
          verOverlay.style.display = 'none';
          if (v !== curVersion) loadVersion(v, curBook, curChap);
        });
        verList.appendChild(el);
      });
    }

    function loadVersion(version, bookIdx, chapIdx) {
      statusEl.style.display = 'block';
      statusEl.textContent = version + ' 데이터를 불러오는 중…';
      contentEl.style.display = 'none';
      fetch('data/bible/' + encodeURIComponent(version) + '.json')
        .then(function (r) {
          if (!r.ok) throw new Error('not found');
          return r.json();
        })
        .then(function (data) {
          BIBLE = data;
          curVersion = version;
          verBtn.textContent = version;
          buildVersionOptions();
          statusEl.style.display = 'none';
          showChapter(bookIdx || 0, chapIdx || 0);
          adjustHeadSpace();
        })
        .catch(function () {
          statusEl.style.display = 'block';
          statusEl.textContent = version + ' 데이터를 불러오지 못했습니다. data/bible/' + version + '.json 파일을 확인하세요.';
        });
    }

    // 버전 선택창
    verBtn.addEventListener('click', function () {
      buildVersionOptions();
      verOverlay.style.display = 'flex';
    });
    document.getElementById('verBack').addEventListener('click', function () {
      verOverlay.style.display = 'none';
    });
    verOverlay.addEventListener('click', function (e) {
      if (e.target === verOverlay) verOverlay.style.display = 'none';
    });

    function updateLocBtn() {
      if (!BIBLE) return;
      locBook.textContent = BIBLE.books[curBook].abbr || BIBLE.books[curBook].name;
      locCV.textContent = (curChap + 1) + ':' + curVerse;
    }

    function showChapter(bookIdx, chapIdx, jumpVerse) {
      curBook = bookIdx; curChap = chapIdx;
      curVerse = jumpVerse && jumpVerse >= 1 ? jumpVerse : 1;
      contentEl.style.display = 'block';

      updateLocBtn();

      var book = BIBLE.books[bookIdx];
      var verses = book.chapters[chapIdx];

      var html = '<div class="chap-title">' + book.name + ' ' + (chapIdx + 1) + '장</div>';
      verses.forEach(function (txt, i) {
        html += '<p class="verse" id="v' + (i + 1) + '"><span class="vnum">' + (i + 1) + '</span>' +
          '<span class="vtext">' + escapeHtml(txt) + '</span></p>';
      });
      contentEl.innerHTML = html;

      if (jumpVerse && jumpVerse >= 1 && jumpVerse <= verses.length) {
        highlightVerse(jumpVerse);
      } else {
        window.scrollTo(0, 0);
      }
      updateTopVerse();
    }

    // 화면 맨 위에 보이는 절을 찾아 표시 갱신
    function updateTopVerse() {
      if (!BIBLE) return;
      var head = document.getElementById('fixedHead');
      var threshold = (head ? head.offsetHeight : 0) + 8;
      var verses = contentEl.querySelectorAll('.verse');
      var top = 1;
      for (var i = 0; i < verses.length; i++) {
        if (verses[i].getBoundingClientRect().top <= threshold) top = i + 1;
        else break;
      }
      if (top !== curVerse) {
        curVerse = top;
        locCV.textContent = (curChap + 1) + ':' + curVerse;
      }
    }

    var scrollTick = false;
    window.addEventListener('scroll', function () {
      if (scrollTick) return;
      scrollTick = true;
      window.requestAnimationFrame(function () {
        updateTopVerse();
        scrollTick = false;
      });
    });

    function highlightVerse(v) {
      var el = document.getElementById('v' + v);
      if (!el) return;
      document.querySelectorAll('.verse.hl').forEach(function (e) { e.classList.remove('hl'); });
      el.classList.add('hl');
      var y = el.getBoundingClientRect().top + window.pageYOffset - 120;
      window.scrollTo({ top: y, behavior: 'smooth' });
    }

    function escapeHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // ===== 3단 피커 (책·장·절) =====
    var pickBook = 0, pickChap = 0;

    function openPicker() {
      pickBook = curBook; pickChap = curChap;
      renderBookCol();
      renderChapCol();
      renderVerseCol();
      pickerOverlay.style.display = 'flex';
      setTimeout(scrollPickerToSelected, 0);
    }
    function closePicker() { pickerOverlay.style.display = 'none'; }

    function renderBookCol() {
      var html = '';
      BIBLE.books.forEach(function (b, i) {
        html += '<div class="pick-item' + (i === pickBook ? ' on' : '') +
          '" data-i="' + i + '">' + b.name + '</div>';
      });
      colBook.innerHTML = html;
      colBook.querySelectorAll('.pick-item').forEach(function (el) {
        el.addEventListener('click', function () {
          pickBook = parseInt(this.getAttribute('data-i'), 10);
          pickChap = 0;
          renderBookCol(); renderChapCol(); renderVerseCol();
        });
      });
    }

    function renderChapCol() {
      var n = BIBLE.books[pickBook].chapters.length;
      var html = '';
      for (var c = 0; c < n; c++) {
        html += '<div class="pick-item' + (c === pickChap ? ' on' : '') +
          '" data-i="' + c + '">' + (c + 1) + '</div>';
      }
      colChap.innerHTML = html;
      colChap.querySelectorAll('.pick-item').forEach(function (el) {
        el.addEventListener('click', function () {
          pickChap = parseInt(this.getAttribute('data-i'), 10);
          renderChapCol(); renderVerseCol();
        });
      });
    }

    function renderVerseCol() {
      var verses = BIBLE.books[pickBook].chapters[pickChap];
      var html = '';
      for (var v = 1; v <= verses.length; v++) {
        html += '<div class="pick-item" data-v="' + v + '">' + v + '</div>';
      }
      colVerse.innerHTML = html;
      colVerse.querySelectorAll('.pick-item').forEach(function (el) {
        el.addEventListener('click', function () {
          var v = parseInt(this.getAttribute('data-v'), 10);
          closePicker();
          showChapter(pickBook, pickChap, v);
        });
      });
    }

    function scrollPickerToSelected() {
      [colBook, colChap].forEach(function (col) {
        var on = col.querySelector('.pick-item.on');
        if (on) col.scrollTop = on.offsetTop - col.clientHeight / 2 + on.clientHeight / 2;
      });
    }

    function findBookIndex(name) {
      for (var i = 0; i < BIBLE.books.length; i++) {
        if (BIBLE.books[i].name === name) return i;
      }
      return -1;
    }

    function scrollBookToIndex(idx) {
      if (idx < 0) return;
      var items = colBook.querySelectorAll('.pick-item');
      if (items[idx]) colBook.scrollTop = items[idx].offsetTop;
    }

    locBtn.addEventListener('click', openPicker);

    // '<' : 적용 없이 창 닫기 (나가기)
    document.getElementById('pickerBack').addEventListener('click', closePicker);

    // 구약 : 책 목록을 창세기로 스크롤
    document.getElementById('otTab').addEventListener('click', function () {
      this.classList.add('on');
      document.getElementById('ntTab').classList.remove('on');
      var i = findBookIndex('창세기');
      scrollBookToIndex(i >= 0 ? i : 0);
    });

    // 신약 : 책 목록을 마태복음으로 스크롤
    document.getElementById('ntTab').addEventListener('click', function () {
      this.classList.add('on');
      document.getElementById('otTab').classList.remove('on');
      var i = findBookIndex('마태복음');
      scrollBookToIndex(i >= 0 ? i : 39);
    });

    // 확인 : 현재 선택(책·장)으로 본문 표시 후 닫기
    document.getElementById('pickerOk').addEventListener('click', function () {
      closePicker();
      showChapter(pickBook, pickChap);
    });

    pickerOverlay.addEventListener('click', function (e) {
      if (e.target === pickerOverlay) closePicker();
    });

    document.getElementById('prevBtn').addEventListener('click', function () {
      if (curChap > 0) showChapter(curBook, curChap - 1);
      else if (curBook > 0) showChapter(curBook - 1, BIBLE.books[curBook - 1].chapters.length - 1);
    });
    document.getElementById('nextBtn').addEventListener('click', function () {
      if (curChap < BIBLE.books[curBook].chapters.length - 1) showChapter(curBook, curChap + 1);
      else if (curBook < BIBLE.books.length - 1) showChapter(curBook + 1, 0);
    });

    function setFont(v) {
      FS = Math.max(FS_MIN, Math.min(FS_MAX, v));
      document.documentElement.style.setProperty('--fs', FS + 'px');
    }
    document.getElementById('fsUp').addEventListener('click', function () { setFont(FS + 2); });
    document.getElementById('fsDown').addEventListener('click', function () { setFont(FS - 2); });
  </script>
</body>
</html>
