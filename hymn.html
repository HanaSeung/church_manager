<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#2f6f4f">
  <title>찬송 뷰어 · 교회 통합 관리</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --green:#2f6f4f; --green-d:#245a40; --green-soft:#e7f1ec;
      --bg:#f5f6f4; --card:#fff; --text:#1f2421; --muted:#6b726d; --line:#e2e5e1;
    }
    body { font-family:'Malgun Gothic',system-ui,sans-serif; background:var(--bg);
      color:var(--text); line-height:1.6; overflow-x:hidden; }
    .topbar { background:var(--green); color:#fff; padding:12px 16px;
      display:flex; align-items:center; gap:12px; }
    .topbar a { color:#fff; text-decoration:none; font-size:14px; opacity:.9; }
    .topbar h1 { font-size:17px; font-weight:700; }
    #fixedHead { position:fixed; top:0; left:0; right:0; z-index:20;
      background:var(--bg); box-shadow:0 2px 6px rgba(0,0,0,.08); }
    #fixedHead .controls { margin:0; border-radius:0; border-left:none; border-right:none; }
    .wrap { max-width:980px; margin:0 auto; padding:14px 16px 60px; }
  </style>
</head>
<body>
  <div id="fixedHead">
  <div class="topbar">
    <a href="index.html">← 홈</a>
    <h1>찬송 뷰어</h1>
  </div>

    <div class="controls">
      <div class="row">
        <button id="prevBtn" class="navb ic" title="이전 장">‹</button>
        <input id="numInput" class="num" type="number" min="1" inputmode="numeric" placeholder="장">
        <button id="nextBtn" class="navb ic" title="다음 장">›</button>
        <button id="zoomOut" class="navb ic" title="축소">－</button>
        <button id="zoomIn" class="navb ic" title="확대">＋</button>
      </div>
    </div>
  </div>

  <div class="wrap">
    <div id="status" class="status">데이터를 불러오는 중…</div>
    <div id="stage" class="stage"><img id="hymnImg" alt="" /></div>
  </div>

  <style>
    .controls { background:var(--card); border:1px solid var(--line); border-radius:12px;
      padding:8px; }
    .row { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
    .num { flex:1 1 auto; min-width:60px; width:60px; padding:10px 8px; font-size:16px;
      text-align:center; border:1px solid var(--line); border-radius:7px; }
    .navb { padding:8px 4px; font-size:14px; border:none; border-radius:0;
      background:none; color:var(--text); cursor:pointer; white-space:nowrap; }
    .navb:hover { color:var(--green); opacity:.8; }
    .navb.ic { flex:0 0 auto; padding:8px 5px; min-width:28px; text-align:center;
      font-size:22px; line-height:1.2; font-weight:700; }
    #prevBtn, #nextBtn { color:var(--green); }
    .status { color:var(--muted); font-size:14px; padding:30px 4px; text-align:center; }
    .stage { overflow:auto; -webkit-overflow-scrolling:touch; }
    .stage img { display:block; width:100%; height:auto; margin:0 auto;
      border:1px solid var(--line); border-radius:8px; background:#fff; }
  </style>

  <script>
    function adjustHeadSpace() {
      var head = document.getElementById('fixedHead');
      var wrap = document.querySelector('.wrap');
      if (head && wrap) wrap.style.paddingTop = (head.offsetHeight + 12) + 'px';
    }
    window.addEventListener('resize', adjustHeadSpace);
    window.addEventListener('load', adjustHeadSpace);

    var BOOKS = [];
    var curBook = '';
    var maxNum = 645;
    var curNum = 1;
    var zoom = 100;

    var numInput = document.getElementById('numInput');
    var statusEl = document.getElementById('status');
    var stage = document.getElementById('stage');
    var img = document.getElementById('hymnImg');

    fetch('data/hymn/hymnbooks.json')
      .then(function (r) { return r.ok ? r.json() : []; })
      .then(function (list) {
        BOOKS = (list && list.length) ? list : [];
        if (!BOOKS.length) throw new Error('no books');
        loadBook(BOOKS[0]);
      })
      .catch(function () {
        statusEl.textContent = '찬송가 데이터를 찾을 수 없습니다. data/hymn 폴더를 확인하세요.';
      });

    function loadBook(name) {
      fetch('data/hymn/' + encodeURIComponent(name) + '.json')
        .then(function (r) { return r.json(); })
        .then(function (meta) {
          curBook = name;
          maxNum = meta.max || 645;
          numInput.max = maxNum;
          statusEl.style.display = 'none';
          showNum(1);
          adjustHeadSpace();
        })
        .catch(function () {
          statusEl.style.display = 'block';
          statusEl.textContent = name + ' 정보를 불러오지 못했습니다.';
        });
    }

    function showNum(n) {
      n = parseInt(n, 10);
      if (isNaN(n) || n < 1) n = 1;
      if (n > maxNum) n = maxNum;
      curNum = n;
      numInput.value = n;
      img.src = 'data/hymn/' + encodeURIComponent(curBook) + '/p' + n + '.png';
      img.alt = curBook + ' ' + n + '장';
      applyZoom();
      window.scrollTo(0, 0);
    }

    function applyZoom() {
      img.style.width = zoom + '%';
    }

    // 입력칸을 누르면 기존 숫자를 전체 선택 → 새 숫자 입력 시 바로 교체
    function selectNum() { numInput.select(); }
    numInput.addEventListener('focus', selectNum);
    numInput.addEventListener('click', selectNum);

    numInput.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') { showNum(numInput.value); numInput.blur(); }
    });
    document.getElementById('prevBtn').addEventListener('click', function () {
      if (curNum > 1) showNum(curNum - 1);
    });
    document.getElementById('nextBtn').addEventListener('click', function () {
      if (curNum < maxNum) showNum(curNum + 1);
    });
    document.getElementById('zoomIn').addEventListener('click', function () {
      zoom = Math.min(zoom + 20, 300); applyZoom();
    });
    document.getElementById('zoomOut').addEventListener('click', function () {
      zoom = Math.max(zoom - 20, 60); applyZoom();
    });
  </script>
</body>
</html>
