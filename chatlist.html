<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1b1c1e">
  <link rel="manifest" href="manifest.json">
  <title>채팅 · 예닮교회</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --green: #2f6f4f; --green-soft: #2a3a33;
      --bg: #1b1c1e; --card: #1b1c1e; --surface: #2a2b2e;
      --text: #ededed; --muted: #9aa0a6; --faint: #6b7178; --line: #303134;
      --danger: #ff6b6b; --badge: #ee4d4d;
    }
    html, body { height: 100%; }
    body { font-family: 'Malgun Gothic', system-ui, sans-serif;
      background: var(--bg); color: var(--text); line-height: 1.6; }
    .wrap { max-width: 720px; margin: 0 auto; height: 100dvh;
      display: flex; flex-direction: column; background: var(--bg); }
    header { flex-shrink: 0; display: flex; align-items: center; gap: 8px;
      padding: 14px 16px; background: var(--card); border-bottom: 1px solid var(--line); }
    header .back { color: var(--muted); text-decoration: none; font-size: 22px; line-height: 1;
      display: flex; align-items: center; }
    header .title { font-size: 19px; font-weight: 700; flex: 1; }
    header .add { width: 36px; height: 36px; border: none; background: none; color: var(--muted);
      font-size: 24px; line-height: 1; cursor: pointer; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; }
    .views { flex: 1; overflow-y: auto; }
    .row { display: flex; align-items: center; gap: 12px; padding: 12px 16px; cursor: pointer; }
    .row:active { background: var(--green-soft); }
    .av { width: 46px; height: 46px; border-radius: 16px; flex-shrink: 0; display: flex;
      align-items: center; justify-content: center; font-weight: 700; font-size: 17px;
      background: var(--surface); color: var(--muted); }
    .mid { flex: 1; min-width: 0; }
    .nm { font-size: 15px; font-weight: 700; }
    .nm .cnt { color: #9aa09a; font-weight: 400; margin-left: 5px; font-size: 14px; }
    .sub { font-size: 13px; color: var(--muted); overflow: hidden; text-overflow: ellipsis;
      white-space: nowrap; margin-top: 1px; }
    .rt { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }
    .tm { font-size: 11px; color: #9aa09a; }
    .badge { background: var(--badge); color: #fff; font-size: 11px; font-weight: 700;
      min-width: 20px; height: 20px; border-radius: 10px; display: flex;
      align-items: center; justify-content: center; padding: 0 6px; }
    .sec { font-size: 12px; color: var(--muted); padding: 12px 16px 4px; }
    .empty { text-align: center; color: var(--muted); font-size: 14px; padding: 48px 16px; }
    .set-item { display: flex; align-items: center; justify-content: space-between;
      padding: 16px; border-bottom: 1px solid var(--line); font-size: 15px; }
    .set-item.soon { cursor: pointer; }
    .set-item.soon:active { background: var(--green-soft); }
    .soon-tag { color: var(--faint); font-size: 13px; }
    .set-btn { border: 1px solid var(--line); background: var(--surface); color: var(--danger);
      font-size: 14px; padding: 7px 16px; border-radius: 8px; cursor: pointer; }
    .tabbar { flex-shrink: 0; display: flex; background: var(--card); border-top: 1px solid var(--line); }
    .tab { flex: 1; text-align: center; padding: 8px 0 6px; font-size: 11px; color: #9aa09a;
      background: none; border: none; cursor: pointer; display: flex; flex-direction: column;
      align-items: center; gap: 3px; font-family: inherit; }
    .tab svg { width: 23px; height: 23px; }
    .tab.on { color: #ffffff; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <a class="back" href="index.html" aria-label="뒤로">‹</a>
      <div class="title" id="barTitle">채팅</div>
      <button class="add" id="addBtn" aria-label="방 추가">＋</button>
    </header>

    <div class="views">
      <div id="viewChat"><div class="empty">불러오는 중…</div></div>
      <div id="viewRoster" style="display:none;"></div>
      <div id="viewSettings" style="display:none;">
        <div class="set-item soon"><span>채팅방 관리</span><span class="soon-tag">미구현</span></div>
        <div class="set-item soon"><span>정렬</span><span class="soon-tag">미구현</span></div>
        <div class="set-item soon"><span>채팅방 폴더 관리</span><span class="soon-tag">미구현</span></div>
        <div class="set-item soon"><span>전체 설정</span><span class="soon-tag">미구현</span></div>
        <div class="set-item"><span>로그아웃</span><button class="set-btn" id="logoutBtn">로그아웃</button></div>
      </div>
    </div>

    <div class="tabbar">
      <button class="tab" data-view="roster" aria-label="명단">
        <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="7.5" r="3.9"/><path d="M4.8 19.8c0-3.7 3.2-5.7 7.2-5.7s7.2 2 7.2 5.7z"/></svg>
        명단
      </button>
      <button class="tab on" data-view="chat" aria-label="채팅">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 4.3c-4.8 0-8.7 3-8.7 6.7 0 2.1 1.3 4 3.2 5.2-.2 1.2-.8 2.4-1.7 3.2 1.6-.1 3.1-.7 4.3-1.6 1 .3 2.1.5 3.2.5 4.8 0 8.7-3 8.7-6.7S16.8 4.3 12 4.3z"/></svg>
        채팅
      </button>
      <button class="tab" data-view="settings" aria-label="설정">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
        설정
      </button>
    </div>
  </div>

  <script type="module">
    import { auth, db } from "./firebase-config.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
    import {
      collection, doc, getDoc, getDocs, setDoc, serverTimestamp, query, where, onSnapshot,
      Timestamp, getCountFromServer
    } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

    const $ = (id) => document.getElementById(id);
    const esc = (s) => (s || '').replace(/[&<>"']/g, (c) =>
      ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    const ms = (ts) => ts && ts.toMillis ? ts.toMillis()
      : (ts && ts.seconds ? ts.seconds * 1000 : 0);
    let me = { uid: null, name: '', level: 1 };

    // 시간 표시: 오늘이면 오전/오후 h:mm, 어제면 '어제', 그 외 m월 d일
    function fmtWhen(d) {
      if (!d) return '';
      const now = new Date();
      const sameDay = d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth() && d.getDate() === now.getDate();
      if (sameDay) {
        let h = d.getHours(); const m = String(d.getMinutes()).padStart(2, '0');
        const ap = h < 12 ? '오전' : '오후'; h = h % 12; if (h === 0) h = 12;
        return ap + ' ' + h + ':' + m;
      }
      const y = new Date(now); y.setDate(now.getDate() - 1);
      if (d.getFullYear() === y.getFullYear() && d.getMonth() === y.getMonth() && d.getDate() === y.getDate()) return '어제';
      return (d.getMonth() + 1) + '월 ' + d.getDate() + '일';
    }

    // ── 인증 가드 ──
    onAuthStateChanged(auth, async (user) => {
      if (!user) { location.replace('index.html'); return; }
      try {
        const snap = await getDoc(doc(db, 'users', user.uid));
        const lv = snap.exists() ? (snap.data().level || 1) : 1;
        if (lv < 2) { alert('채팅은 회원(2단계 이상)만 이용할 수 있습니다.'); location.replace('index.html'); return; }
        me = { uid: user.uid, name: (snap.data().name || user.displayName || '성도'), level: lv };
        watchRooms();
        loadRoster();
      } catch (e) {
        alert('정보를 불러오지 못했습니다.'); location.replace('index.html');
      }
    });

    // ── 채팅 탭: 방 목록 (전체방 + 내 1:1 방) ──
    const roomsMap = new Map();
    let renderSeq = 0;
    function watchRooms() {
      // 전체방
      onSnapshot(doc(db, 'rooms', 'all'), (s) => {
        if (s.exists()) roomsMap.set('all', { id: 'all', ...s.data() });
        else roomsMap.delete('all');
        renderRooms();
      });
      // 내가 속한 1:1 방
      onSnapshot(query(collection(db, 'rooms'), where('members', 'array-contains', me.uid)), (snap) => {
        [...roomsMap.keys()].forEach((k) => { if (k !== 'all') roomsMap.delete(k); });
        snap.forEach((d) => roomsMap.set(d.id, { id: d.id, ...d.data() }));
        renderRooms();
      });
    }

    async function renderRooms() {
      const seq = ++renderSeq;
      const rooms = [...roomsMap.values()].sort((a, b) => ms(b.lastMessageAt) - ms(a.lastMessageAt));
      if (!rooms.length) { $('viewChat').innerHTML = '<div class="empty">채팅방이 없습니다.</div>'; return; }
      const rows = await Promise.all(rooms.map(roomRow));
      if (seq !== renderSeq) return;   // 더 최신 렌더가 있으면 폐기
      $('viewChat').innerHTML = rows.join('');
      document.querySelectorAll('#viewChat .row').forEach((el) =>
        el.addEventListener('click', () => { location.href = 'chat.html?room=' + el.getAttribute('data-room'); }));
    }

    async function roomUnread(roomId) {
      let base = Timestamp.fromMillis(0);
      try {
        const rs = await getDoc(doc(db, 'rooms', roomId, 'reads', me.uid));
        if (rs.exists() && rs.data().lastReadAt) base = rs.data().lastReadAt;
      } catch (e) {}
      try {
        const c = await getCountFromServer(query(
          collection(db, 'rooms', roomId, 'messages'), where('createdAt', '>', base)));
        return c.data().count;
      } catch (e) { return 0; }
    }

    async function roomRow(r) {
      let name, cnt = '';
      const isPrivate = (r.id !== 'all' && r.type !== 'all');
      if (!isPrivate) {
        name = r.name || '전체방';
        if (r.memberCount) cnt = `<span class="cnt">${r.memberCount}</span>`;
      } else {
        const cntNum = r.memberCount || (Array.isArray(r.members) ? r.members.length : 0);
        const others = Array.isArray(r.roster) ? r.roster.filter((m) => m.uid !== me.uid) : [];
        if (cntNum <= 2) {
          name = r.name || (others[0] ? others[0].name : '대화');
        } else {
          name = r.name || ((others[0] ? others[0].name : '대화') + ' 외 ' + (cntNum - 1) + '명');
          cnt = `<span class="cnt">${cntNum}</span>`;
        }
      }
      const last = esc(r.lastMessageText || '메시지가 없습니다.');
      const when = fmtWhen(r.lastMessageAt ? new Date(ms(r.lastMessageAt)) : null);
      const unread = await roomUnread(r.id);
      const badge = unread > 0 ? `<span class="badge">${unread > 999 ? '999+' : unread}</span>` : '';
      return `<div class="row" data-room="${esc(r.id)}">
        <div class="av">${esc(name.slice(0, 1))}</div>
        <div class="mid"><div class="nm">${esc(name)}${cnt}</div><div class="sub">${last}</div></div>
        <div class="rt"><span class="tm">${when}</span>${badge}</div>
      </div>`;
    }

    // ── 명단 탭: 등록 회원 (rooms/all roster, 이름만) ──
    async function loadRoster() {
      try {
        const s = await getDoc(doc(db, 'rooms', 'all'));
        const roster = (s.exists() && Array.isArray(s.data().roster)) ? s.data().roster.slice() : [];
        roster.sort((a, b) => (a.name || '').localeCompare(b.name || '', 'ko'));
        if (!roster.length) {
          $('viewRoster').innerHTML = '<div class="empty">명단이 아직 없습니다.<br>관리자가 권한 관리를 한 번 열면 채워집니다.</div>';
          return;
        }
        let html = `<div class="sec">회원 ${roster.length}명</div>`;
        roster.forEach((m) => {
          const nm = esc(m.name || '성도');
          const meTag = (m.uid === me.uid) ? ' <span style="color:var(--faint); font-weight:400; font-size:13px;">(나)</span>' : '';
          html += `<div class="row roster-row" data-uid="${esc(m.uid || '')}" data-name="${nm}">
            <div class="av">${esc((m.name || '성').slice(0, 1))}</div>
            <div class="mid"><div class="nm">${nm}${meTag}</div></div>
          </div>`;
        });
        $('viewRoster').innerHTML = html;
        document.querySelectorAll('#viewRoster .roster-row').forEach((el) => {
          const uid = el.getAttribute('data-uid');
          if (!uid || uid === me.uid) { el.style.cursor = 'default'; return; }   // 본인/빈 uid는 방 생성 안 함
          el.addEventListener('click', () => openDM(uid, el.getAttribute('data-name')));
        });
      } catch (e) {
        $('viewRoster').innerHTML = '<div class="empty">명단을 불러오지 못했습니다.</div>';
      }
    }

    // ── 탭 전환 ──
    const TITLES = { roster: '명단', chat: '채팅', settings: '설정' };
    document.querySelectorAll('.tab[data-view]').forEach((t) => {
      t.addEventListener('click', () => {
        const v = t.getAttribute('data-view');
        document.querySelectorAll('.tab').forEach((x) => x.classList.remove('on'));
        t.classList.add('on');
        $('viewChat').style.display = v === 'chat' ? '' : 'none';
        $('viewRoster').style.display = v === 'roster' ? '' : 'none';
        $('viewSettings').style.display = v === 'settings' ? '' : 'none';
        $('barTitle').textContent = TITLES[v];
        $('addBtn').style.display = v === 'chat' ? '' : 'none';
      });
    });

    // ── 방 추가(누구나) · 현재 자리만 ──
    $('addBtn').addEventListener('click', () => alert('준비 중입니다.'));

    // ── 설정: 미구현 항목 안내 ──
    document.querySelectorAll('#viewSettings .soon').forEach((el) =>
      el.addEventListener('click', () => alert('준비 중입니다.')));

    // ── 1:1 대화방 열기 (명단에서 사람 클릭) ──
    async function openDM(otherUid, otherName) {
      if (!otherUid || otherUid === me.uid) return;   // 본인은 방 안 만듦
      const dmId = 'dm_' + [me.uid, otherUid].sort().join('_');
      try {
        const ref = doc(db, 'rooms', dmId);
        const s = await getDoc(ref);
        if (!s.exists()) {
          await setDoc(ref, {
            type: 'dm',
            members: [me.uid, otherUid],
            memberCount: 2,
            roster: [{ uid: me.uid, name: me.name }, { uid: otherUid, name: otherName || '성도' }],
            createdAt: serverTimestamp()
          });
        }
        location.href = 'chat.html?room=' + dmId;
      } catch (e) {
        alert('대화방을 열지 못했습니다.');
      }
    }

    // ── 로그아웃 ──
    $('logoutBtn').addEventListener('click', async () => {
      try { await signOut(auth); } catch (e) {}
      location.replace('index.html');
    });
  </script>
</body>
</html>
