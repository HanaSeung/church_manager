<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#2f6f4f">
  <link rel="manifest" href="manifest.json">
  <title>전체방 · 예닮교회</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --green: #2f6f4f; --green-soft: #e7f1ec; --green-deep: #245540;
      --bg: #f5f6f4; --card: #ffffff;
      --text: #1f2421; --muted: #6b726d; --line: #e2e5e1;
      --danger: #c0392b; --amber: #d98a00;
      --kakao: #FEE500; --kakao-text: #191919; --chat-bg: #b2c7d9;
    }
    html, body { height: 100%; }
    body { font-family: 'Malgun Gothic', system-ui, sans-serif;
      background: var(--bg); color: var(--text); line-height: 1.6; }
    .wrap { max-width: 720px; margin: 0 auto; height: 100dvh;
      display: flex; flex-direction: column; background: var(--bg); }
    header { flex-shrink: 0; position: sticky; top: 0; z-index: 10; background: var(--card);
      display: flex; align-items: center; gap: 12px; padding: 14px 16px;
      border-bottom: 1px solid var(--line); }
    .msgarea { flex: 1; overflow-y: auto; padding: 8px 12px 14px;
      display: flex; flex-direction: column; background: var(--chat-bg); }
    .inbar { flex-shrink: 0; display: flex; flex-direction: column; gap: 8px; padding: 10px 12px;
      border-top: 1px solid var(--line); background: var(--card); }
    .inbar input { width: 100%; padding: 11px 15px; border: 1px solid var(--line);
      border-radius: 22px; font-size: 15px; font-family: inherit; }
    .inbar input:focus { outline: none; border-color: var(--green); }
    .inrow { display: flex; align-items: center; gap: 4px; }
    .icon-btn { width: 38px; height: 38px; border: none; background: none; color: var(--muted);
      font-size: 20px; line-height: 1; border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center; padding: 0; }
    .icon-btn:active { background: var(--green-soft); }
    #sendBtn { border: none; background: var(--kakao); color: var(--kakao-text); padding: 0 20px; height: 38px;
      border-radius: 19px; font-size: 15px; font-weight: 600; cursor: pointer; white-space: nowrap; }
    #sendBtn:disabled { background: #e3e5e2; color: #9aa09a; cursor: default; }
    .icon-btn.on { background: var(--green-soft); color: var(--green); }
    .ep { flex-shrink: 0; border-top: 1px solid var(--line); background: var(--card); }
    .ep-tabs { display: flex; gap: 4px; padding: 6px 10px; border-bottom: 1px solid var(--line); align-items: center; }
    .ep-tab { width: 36px; height: 34px; border-radius: 8px; display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0; color: var(--muted); background: none; border: none; cursor: pointer; font-family: inherit; }
    .ep-tab.ph { font-size: 12px; background: var(--bg); }
    .ep-tab.on { background: var(--green-soft); color: var(--green); }
    .ep-tab.add { margin-left: auto; font-size: 20px; }
    .ep-body { max-height: 190px; overflow-y: auto; padding: 8px 10px; }
    .ep-emoji { display: grid; grid-template-columns: repeat(8, 1fr); gap: 2px; }
    .ep-em { font-size: 22px; text-align: center; padding: 5px 0; border-radius: 6px; cursor: pointer;
      background: none; border: none; font-family: inherit; }
    .ep-em:active { background: var(--green-soft); }
    .ep-sticker { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .ep-scell { aspect-ratio: 1; background: var(--bg); border: 1px dashed var(--line); border-radius: 10px;
      display: flex; align-items: center; justify-content: center; font-size: 11px; color: #9aa09a; }
    .ep-note { font-size: 11px; color: #9aa09a; text-align: center; padding: 8px 0 2px; }
    .loadmore { text-align: center; padding: 6px 0 4px; }
    .loadmore button { border: 1px solid var(--line); background: var(--card); color: var(--muted);
      font-size: 13px; padding: 6px 16px; border-radius: 16px; cursor: pointer; font-family: inherit; }
    .day { text-align: center; margin: 14px 0 8px; }
    .day span { background: rgba(0,0,0,.18); color: #fff; font-size: 12px; padding: 3px 12px; border-radius: 12px; }
    .line { display: flex; gap: 8px; margin-top: 10px; align-items: flex-start; }
    .line.cont { margin-top: 2px; }
    .line.me { justify-content: flex-end; }
    .av { width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0; display: flex;
      align-items: center; justify-content: center; font-weight: 700; font-size: 14px;
      background: var(--green-soft); color: var(--green); }
    .av.ph { visibility: hidden; }
    .col { max-width: 76%; display: flex; flex-direction: column; }
    .nm { font-size: 12px; color: #33414d; margin: 0 0 3px 3px; }
    .bubrow { display: flex; align-items: flex-end; gap: 6px; }
    .line.me .bubrow { flex-direction: row-reverse; }
    .bub { padding: 8px 12px; border-radius: 14px; font-size: 15px; line-height: 1.45;
      white-space: pre-wrap; word-break: break-word; }
    .other .bub { background: #fff; border: 1px solid var(--line); border-top-left-radius: 4px; }
    .me .bub { background: var(--kakao); color: var(--kakao-text); border-top-right-radius: 4px; }
    .meta { display: flex; flex-direction: column; align-items: flex-start; flex-shrink: 0; }
    .line.me .meta { align-items: flex-end; }
    .unread { font-size: 12px; font-weight: 700; color: var(--amber); line-height: 1.2; }
    .time { font-size: 11px; color: #51616e; white-space: nowrap; }
    .empty { text-align: center; color: var(--muted); font-size: 14px; padding: 40px 16px; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <a id="backBtn" href="chatlist.html" style="color:var(--muted); text-decoration:none;
        font-size:22px; line-height:1; display:flex; align-items:center;" aria-label="뒤로">‹</a>
      <div style="font-size:18px; font-weight:700; flex:1;">전체방</div>
      <span id="memberInfo" style="font-size:13px; color:var(--muted);"></span>
    </header>
    <div id="msgArea" class="msgarea">
      <div id="loadMore" class="loadmore" style="display:none;">
        <button id="loadMoreBtn">이전 메시지 더 보기</button>
      </div>
      <div id="msgList"></div>
    </div>
    <div id="emojiPanel" class="ep" style="display:none;">
      <div class="ep-tabs">
        <button class="ep-tab on" data-tab="emoji" aria-label="이모지">😊</button>
        <button class="ep-tab ph" data-tab="sticker" aria-label="세트1">세트1</button>
        <button class="ep-tab ph" data-tab="sticker" aria-label="세트2">세트2</button>
        <button class="ep-tab ph" data-tab="sticker" aria-label="세트3">세트3</button>
        <button class="ep-tab add" id="epAdd" aria-label="세트 추가">＋</button>
      </div>
      <div class="ep-body">
        <div id="epEmoji" class="ep-emoji"></div>
        <div id="epSticker" style="display:none;">
          <div class="ep-sticker" id="epStickerGrid"></div>
          <div class="ep-note">그림(스티커)이 들어올 자리 · 저장소 정해지면 채움</div>
        </div>
      </div>
    </div>
    <div class="inbar">
      <input id="msgInput" type="text" placeholder="메시지 입력" autocomplete="off">
      <div class="inrow">
        <button class="icon-btn" id="attachBtn" aria-label="첨부">＋</button>
        <button class="icon-btn" id="emojiBtn" aria-label="이모티콘">🙂</button>
        <button class="icon-btn" id="fileBtn" aria-label="파일">📄</button>
        <span style="flex:1;"></span>
        <button id="sendBtn">전송</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { auth, db } from "./firebase-config.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
    import {
      collection, doc, getDoc, getDocs, setDoc, addDoc, deleteDoc,
      query, where, orderBy, limit, startAfter, onSnapshot,
      serverTimestamp, Timestamp
    } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

    const $ = (id) => document.getElementById(id);
    const ROOM = 'all';
    const PAGE = 50;

    let me = { uid: null, name: '', level: 1 };
    const byId = new Map();        // 메시지 id -> data (older + live 통합 저장소)
    const reads = new Map();       // 회원 uid -> { ms, name }  (각자 읽은 지점)
    let oldestTs = null;           // 더 불러오기 커서(가장 오래된 메시지 시각)
    let newestTs = null;           // 실시간 구독 기준(이 시각 이후만 구독)
    let unsubLive = null, unsubReads = null, unsubRoom = null;
    let loadingOlder = false, noMoreOlder = false;
    let memberCount = 0;
    let rosterArr = [];          // 2단계 이상 전체 명단 [{uid,name}] (관리자가 권한관리 창에서 저장)
    let audioCtx = null;

    const esc = (s) => (s || '').replace(/[&<>"']/g, (c) =>
      ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    const ms = (ts) => ts && ts.toMillis ? ts.toMillis()
      : (ts && ts.seconds ? ts.seconds * 1000 : 0);

    function fmtTime(d) {
      let h = d.getHours(); const m = String(d.getMinutes()).padStart(2, '0');
      const ap = h < 12 ? '오전' : '오후'; h = h % 12; if (h === 0) h = 12;
      return ap + ' ' + h + ':' + m;
    }
    function dayLabel(d) {
      const wk = ['일', '월', '화', '수', '목', '금', '토'][d.getDay()];
      return d.getFullYear() + '년 ' + (d.getMonth() + 1) + '월 ' + d.getDate() + '일 ' + wk + '요일';
    }
    const sameDay = (a, b) => a.getFullYear() === b.getFullYear()
      && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();

    // ── 인증 가드: 비로그인/등급 미달이면 메인으로 ──
    onAuthStateChanged(auth, async (user) => {
      if (!user) { location.replace('index.html'); return; }
      try {
        const snap = await getDoc(doc(db, 'users', user.uid));
        const lv = snap.exists() ? (snap.data().level || 1) : 1;
        if (lv < 2) { alert('전체방은 회원(2단계 이상)만 이용할 수 있습니다.'); location.replace('index.html'); return; }
        me = { uid: user.uid, name: (snap.data().name || user.displayName || '성도'), level: lv };
        await ensureRoom();
        subscribeRoom();
        if (me.level >= 4) refreshMemberCount();   // 관리자가 들어올 때 전체 회원 수 갱신
        subscribeReads();
        await initialLoad();
      } catch (e) {
        alert('정보를 불러오지 못했습니다. 다시 시도해 주세요.');
        location.replace('index.html');
      }
    });

    // 방 문서가 없으면 최초 1회 생성 (고정 id 'all')
    async function ensureRoom() {
      const ref = doc(db, 'rooms', ROOM);
      const s = await getDoc(ref);
      if (!s.exists()) {
        await setDoc(ref, { name: '전체방', type: 'all', createdAt: serverTimestamp() });
      }
    }

    // ── 방 문서 구독: 전체 회원 수 + 명단(roster) 반영 ──
    function subscribeRoom() {
      unsubRoom = onSnapshot(doc(db, 'rooms', ROOM), (s) => {
        const v = s.data() || {};
        memberCount = v.memberCount || 0;
        rosterArr = Array.isArray(v.roster) ? v.roster : [];
        $('memberInfo').textContent = memberCount ? (memberCount + '명') : '';
        render();   // 명단 갱신 시 안 읽은 수 재계산
      });
    }
    // 관리자만: 2단계 이상 명단·수를 세어 방에 기록(권한관리 창 외 보조 갱신 경로)
    async function refreshMemberCount() {
      try {
        const snap = await getDocs(query(collection(db, 'users'), where('level', '>=', 2)));
        const members = [];
        snap.forEach((d) => members.push({ uid: d.id, name: d.data().name || '성도' }));
        await setDoc(doc(db, 'rooms', ROOM),
          { memberCount: members.length, roster: members }, { merge: true });
      } catch (e) {}
    }

    // ── 회원별 '읽은 지점' 실시간 구독 (A방식 핵심) ──
    function subscribeReads() {
      unsubReads = onSnapshot(collection(db, 'rooms', ROOM, 'reads'), (snap) => {
        reads.clear();
        snap.forEach((d) => {
          const v = d.data();
          reads.set(d.id, { ms: ms(v.lastReadAt), name: v.name || '' });
        });
        render();   // 안 읽은 수만 갱신
      });
    }

    // ── 최초 로드: 최근 50개 가져오고 이후 실시간 구독 시작 ──
    async function initialLoad() {
      const q = query(collection(db, 'rooms', ROOM, 'messages'),
        orderBy('createdAt', 'desc'), limit(PAGE));
      const snap = await getDocs(q);
      const arr = [];
      snap.forEach((d) => arr.push(Object.assign({ id: d.id }, d.data())));
      arr.reverse();
      arr.forEach((m) => byId.set(m.id, m));
      if (arr.length) { oldestTs = arr[0].createdAt; newestTs = arr[arr.length - 1].createdAt; }
      noMoreOlder = arr.length < PAGE;
      $('loadMore').style.display = noMoreOlder ? 'none' : 'block';
      render(true);
      markReadSoon();
      subscribeLive();
    }

    // 최초 로드 이후 새로 올라오는 메시지만 구독(window 밀림 방지, 비용 최소)
    function subscribeLive() {
      const base = newestTs || Timestamp.fromMillis(0);
      const q = query(collection(db, 'rooms', ROOM, 'messages'),
        where('createdAt', '>', base), orderBy('createdAt', 'asc'));
      unsubLive = onSnapshot(q, (snap) => {
        let incoming = false, fromOther = false;
        snap.docChanges().forEach((ch) => {
          const m = Object.assign({ id: ch.doc.id }, ch.doc.data());
          if (ch.type === 'removed') { byId.delete(m.id); return; }
          if (!byId.has(m.id)) { incoming = true; if (m.authorUid !== me.uid) fromOther = true; }
          byId.set(m.id, m);
          if (m.createdAt && ms(m.createdAt) > ms(newestTs)) newestTs = m.createdAt;
        });
        if (incoming) {
          const wasBottom = atBottom();
          render(wasBottom);
          if (fromOther && document.visibilityState === 'visible') ding();
          if (document.visibilityState === 'visible') markReadSoon();
        } else {
          render();
        }
      });
    }

    // ── 이전 메시지 더 불러오기 (위로 스크롤 / 버튼) ──
    async function loadOlder() {
      if (loadingOlder || noMoreOlder || !oldestTs) return;
      loadingOlder = true;
      const area = $('msgArea');
      const prevH = area.scrollHeight, prevTop = area.scrollTop;
      try {
        const q = query(collection(db, 'rooms', ROOM, 'messages'),
          orderBy('createdAt', 'desc'), startAfter(oldestTs), limit(PAGE));
        const snap = await getDocs(q);
        const arr = [];
        snap.forEach((d) => arr.push(Object.assign({ id: d.id }, d.data())));
        if (arr.length) { arr.reverse(); arr.forEach((m) => byId.set(m.id, m)); oldestTs = arr[0].createdAt; }
        if (arr.length < PAGE) { noMoreOlder = true; $('loadMore').style.display = 'none'; }
        render();
        area.scrollTop = prevTop + (area.scrollHeight - prevH);   // 스크롤 위치 보존
      } catch (e) {} finally { loadingOlder = false; }
    }

    function atBottom() {
      const a = $('msgArea');
      return a.scrollTop + a.clientHeight >= a.scrollHeight - 80;
    }

    // 메시지 1건의 '안 읽은 사람 수'
    //  - 명단(roster)이 있으면 2단계 이상 전원 기준(작성자 제외, 안 읽었거나 읽은 지점이 이전인 사람)
    //  - 명단이 아직 없으면(관리자 미저장) reads 기록이 있는 사람들 기준으로 임시 계산
    function computeUnread(m) {
      const t = ms(m.createdAt);
      if (!t) return 0;
      let n = 0;
      if (rosterArr.length) {
        rosterArr.forEach((u) => {
          if (u.uid === m.authorUid) return;
          const r = reads.get(u.uid);
          if (!r || r.ms < t) n++;
        });
      } else {
        reads.forEach((r, uid) => { if (uid !== m.authorUid && r.ms < t) n++; });
      }
      return n;
    }

    // ── 렌더 (날짜 구분 + 연속 묶기 + 말풍선 + 안 읽은 수) ──
    function render(toBottom) {
      const list = $('msgList');
      const arr = Array.from(byId.values()).sort((a, b) => ms(a.createdAt) - ms(b.createdAt));
      if (!arr.length) { list.innerHTML = '<div class="empty">첫 인사를 남겨 보세요.</div>'; return; }
      let html = '', prevDate = null, prevUid = null, prevMin = null;
      arr.forEach((m) => {
        const t = ms(m.createdAt);
        const d = t ? new Date(t) : new Date();
        if (!prevDate || !sameDay(prevDate, d)) {
          html += '<div class="day"><span>' + dayLabel(d) + '</span></div>';
          prevUid = null;
        }
        const mine = (m.authorUid === me.uid);
        const minute = Math.floor(t / 60000);
        const cont = (prevUid === m.authorUid && prevMin === minute);
        const unread = computeUnread(m);
        const ur = unread > 0 ? '<span class="unread">' + unread + '</span>' : '';
        const tm = '<span class="time">' + fmtTime(d) + '</span>';
        const bub = '<div class="bub">' + esc(m.text) + '</div>';
        const meta = '<div class="meta">' + ur + tm + '</div>';
        if (mine) {
          html += '<div class="line me' + (cont ? ' cont' : '') + '">' +
            '<div class="col"><div class="bubrow">' + bub + meta + '</div></div></div>';
        } else {
          const av = cont ? '<div class="av ph"></div>'
            : '<div class="av">' + esc((m.authorName || '?').slice(0, 1)) + '</div>';
          const nm = cont ? '' : '<div class="nm">' + esc(m.authorName || '') + '</div>';
          html += '<div class="line other' + (cont ? ' cont' : '') + '">' + av +
            '<div class="col">' + nm + '<div class="bubrow">' + bub + meta + '</div></div></div>';
        }
        prevDate = d; prevUid = m.authorUid; prevMin = minute;
      });
      list.innerHTML = html;
      if (toBottom) { const a = $('msgArea'); a.scrollTop = a.scrollHeight; }
    }

    // ── 내 '읽은 지점' 갱신 (디바운스로 묶어 비용 절감) ──
    let markTimer = null;
    function markReadSoon() { clearTimeout(markTimer); markTimer = setTimeout(markRead, 700); }
    async function markRead() {
      if (!newestTs) return;
      const mine = reads.get(me.uid);
      if (mine && mine.ms >= ms(newestTs)) return;   // 이미 최신까지 읽음 → 쓰기 생략
      try {
        await setDoc(doc(db, 'rooms', ROOM, 'reads', me.uid),
          { lastReadAt: newestTs, name: me.name, updatedAt: serverTimestamp() }, { merge: true });
      } catch (e) {}
    }

    // ── 전송 ──
    async function send() {
      const v = $('msgInput').value.trim();
      if (!v) return;
      $('sendBtn').disabled = true;
      resumeAudio();
      try {
        await addDoc(collection(db, 'rooms', ROOM, 'messages'),
          { text: v, authorUid: me.uid, authorName: me.name, createdAt: serverTimestamp() });
        await setDoc(doc(db, 'rooms', ROOM),
          { lastMessageAt: serverTimestamp(), lastMessageText: v.slice(0, 60), lastMessageBy: me.name },
          { merge: true });
        $('msgInput').value = '';
        togglePanel(false);
      } catch (e) { alert('전송에 실패했습니다.'); }
      finally { updateSendBtn(); $('msgInput').focus(); }
    }
    $('sendBtn').addEventListener('click', send);
    $('msgInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') send(); });
    // 전송 버튼: 입력 없으면 비활성(회색), 있으면 활성(노랑)
    function updateSendBtn() { $('sendBtn').disabled = ($('msgInput').value.trim() === ''); }
    $('msgInput').addEventListener('input', updateSendBtn);
    updateSendBtn();
    $('loadMoreBtn').addEventListener('click', loadOlder);
    // 첨부·파일: 현재 표시만, 기능은 추후 (저장소 결정 후)
    ['attachBtn', 'fileBtn'].forEach((id) =>
      $(id).addEventListener('click', () => alert('준비 중입니다.')));

    // ── 이모지/스티커 패널 ──
    const EMOJIS = ['😊','😄','🙂','😉','😍','🥰','😂','🤣','😅','😎','🤔','😮',
      '😢','😭','🥳','😴','🙏','👍','👏','🙌','🤝','🫶','❤️','🧡',
      '💛','💚','💙','💜','🤍','🎉','✨','🔥','⭐','💯','🙇','✝️'];
    (function buildPanel() {
      const eg = $('epEmoji');
      EMOJIS.forEach((e) => {
        const b = document.createElement('button');
        b.type = 'button'; b.className = 'ep-em'; b.textContent = e;
        b.addEventListener('click', () => { $('msgInput').value += e; updateSendBtn(); });
        eg.appendChild(b);
      });
      const sg = $('epStickerGrid');     // 스티커 자리표시(형태만)
      for (let i = 0; i < 12; i++) {
        const c = document.createElement('div'); c.className = 'ep-scell'; c.textContent = '그림';
        sg.appendChild(c);
      }
    })();
    function togglePanel(force) {
      const ep = $('emojiPanel');
      const open = (force !== undefined) ? force : (ep.style.display === 'none');
      ep.style.display = open ? 'block' : 'none';
      $('emojiBtn').classList.toggle('on', open);
    }
    $('emojiBtn').addEventListener('click', () => togglePanel());
    $('epAdd').addEventListener('click', () => alert('준비 중입니다.'));
    document.querySelectorAll('.ep-tab[data-tab]').forEach((t) => {
      t.addEventListener('click', () => {
        document.querySelectorAll('.ep-tab').forEach((x) => x.classList.remove('on'));
        t.classList.add('on');
        const isEmoji = t.getAttribute('data-tab') === 'emoji';
        $('epEmoji').style.display = isEmoji ? 'grid' : 'none';
        $('epSticker').style.display = isEmoji ? 'none' : 'block';
      });
    });
    $('msgArea').addEventListener('scroll', () => { if ($('msgArea').scrollTop < 40) loadOlder(); });
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') markReadSoon();
    });

    // ── 알림음 (켜놓은 상태에서 남의 새 메시지 도착 시) ──
    function resumeAudio() {
      try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
      } catch (e) {}
    }
    function ding() {
      try {
        resumeAudio(); if (!audioCtx) return;
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type = 'sine'; o.frequency.value = 880;
        g.gain.setValueAtTime(0.0001, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.15, audioCtx.currentTime + 0.02);
        g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.25);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime + 0.26);
      } catch (e) {}
    }
    window.addEventListener('pointerdown', resumeAudio, { once: true });
    window.addEventListener('beforeunload', () => {
      if (unsubLive) unsubLive(); if (unsubReads) unsubReads(); if (unsubRoom) unsubRoom();
    });
  </script>
</body>
